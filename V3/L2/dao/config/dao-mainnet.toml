# ──────────────────────────────────────────────────────────────────────────────
# ZION DAO — Mainnet Configuration (post-3.0.3 decimal fork)
# On-chain governance: proposals, voting (1 ZION = 1 vote), treasury multisig
# All flower values are in NEW 6-decimal scale (FLOWERS_PER_ZION = 1_000_000)
# ──────────────────────────────────────────────────────────────────────────────

name    = "ZION DAO"
version = "1.0.0"

# ── HTTP API ─────────────────────────────────────────────────────────────────

api_port = 8450
api_key  = ""             # set ZION_DAO_API_KEY env var for production

# ── Database ─────────────────────────────────────────────────────────────────

db_path = "/data/dao/dao.db"

# ── L1 Connection ────────────────────────────────────────────────────────────

l1_rpc_url    = "127.0.0.1:8443"
l1_rpc_backup = ""                         # set backup RPC for failover

# ── L1 Scanner ───────────────────────────────────────────────────────────────

scan_interval_secs = 15
min_vote_weight    = 1_000_000             # 1 ZION in flowers (1e6 scale)
finality_blocks    = 12                     # mainnet: deeper finality

# ── Governance ───────────────────────────────────────────────────────────────

proposal_threshold  = 10_000_000_000_000   # 10 M ZION in flowers (1e6 scale)
quorum_percent      = 15.0                         # mainnet: stricter quorum
voting_period_days  = 14                           # mainnet: longer voting
timelock_hours      = 72                           # mainnet: longer timelock

# ── Treasury ─────────────────────────────────────────────────────────────────
# These are the REAL DAO treasury addresses from genesis.rs (premine outputs).
# Locked until DAO_TREASURY_LOCK_HEIGHT = 144_000 (≈100 days at 60s/block).

treasury_addresses = [
    "zion1u5u7k43240d5l4d0x7q5m3c4a838z4k000cv3q0",  # Community Governance (main) — 2.5B ZION (premine slot 6)
    "zion1m8d235x268h8d887s036m8c3x7s356d3r37k6m6",  # Grants & Bounties — 1.0B ZION (premine slot 7)
    "zion102s8k4k0w783d657j255z865e47054s342u87v3",  # Ecosystem Bootstrap — 0.5B ZION (premine slot 8)
]
daily_spend_limit   = 50_000_000     # 50 M ZION (whole coins) — conservative start
multisig_threshold  = 5
multisig_total      = 7

