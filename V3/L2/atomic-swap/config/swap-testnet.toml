# ──────────────────────────────────────────────────────────────────────────────
# ZION Atomic Swap Service — Testnet Configuration
# Cross-chain HTLC swaps on ZION L1
# ──────────────────────────────────────────────────────────────────────────────

[swap]
name              = "ZION Atomic Swap Service"
network           = "testnet"
min_lock_flowers  = 1_000_000             # 1 ZION minimum (1e6 scale)
max_lock_atomic   = 10_000_000_000        # 10 000 ZION maximum (1e6 scale)
release_fee_atomic = 2_000                 # 0.000000002 ZION flat fee

# ── ZION L1 ──────────────────────────────────────────────────────────────────

[l1]
rpc_url            = "127.0.0.1:8443"      # colocated with Core node
# rpc_token        = ""                    # set ZION_RPC_TOKEN env var
# escrow_key_hex   = ""                    # set ZION_SWAP_ESCROW_KEY env var
scan_batch_size    = 10
poll_interval_secs = 5

# ── Database ─────────────────────────────────────────────────────────────────

[database]
path = "V3/data/atomic-swap.db"

# ── HTTP API ─────────────────────────────────────────────────────────────────

[api]
bind = "0.0.0.0:8452"
# bearer_token = ""   # set for production; open for testnet

# ── Refund Automation ────────────────────────────────────────────────────────

[refund]
auto_refund        = true
check_interval_secs = 30
grace_period_secs  = 120

# ── EVM Watcher (Base Sepolia HTLC events) ───────────────────────────────────

[evm_watcher]
enabled            = true
rpc_url            = "https://sepolia.base.org"
rpc_url_backup     = "https://rpc.ankr.com/base_sepolia"  # Ankr free-tier fallback
contract_addr      = "0xa5a09b2C09A7182BBA9623A2D2cd46cD7D041721"
poll_interval_secs = 12
start_block        = 0
