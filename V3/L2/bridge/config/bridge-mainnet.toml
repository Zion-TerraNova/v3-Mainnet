# ──────────────────────────────────────────────────────────────
#  ZION Bridge Relay Configuration — V3 Mainnet (Base)
# ──────────────────────────────────────────────────────────────
#
#  Mainnet contracts are deployed and live. This template is configured for
#  5-of-5 validator multisig. Base bridge: 0x72c8f0Dc...; non-Base bridges:
#  0xa5a09b2C... on BSC/Polygon/Arbitrum/Optimism/Avalanche. Stale deployment
#  0x89504D6e... has no wZION BRIDGE_ROLE.
#
#  Usage: ZION_BRIDGE_CONFIG=V3/config/bridge-mainnet.toml cargo run -p zion-bridge

[bridge]
name    = "ZION Bridge Relay V3"
version = "3.0.2"
network = "mainnet"

# ── ZION L1 Connection ──────────────────────────────────────
[l1]
rpc_url        = "http://127.0.0.1:8443"
rpc_url_backup = "http://rpc.zionterranova.com:8443"
bridge_address = "zion1j53677g5k83030x3s2z2z644e7h07792q0u02t7"
finality_blocks     = 60
poll_interval_secs  = 15
start_block_height  = 4000  # Local/Edge L1 nodes retain ~1000 accepted blocks; scan from a height that exists after the 3.0.4 genesis reset
default_evm_recipient = "0xdde17506BC2D2dCE1d594bD1D85B0BAbb389D186"

# ── EVM Chains ──────────────────────────────────────────────

# -- Base Mainnet — 5/5 ZIONBridge deployed and wZION BRIDGE_ROLE migrated.
[[evm_chains]]
chain_id                = "base"
name                    = "Base (Mainnet)"
evm_chain_id            = 8453
rpc_url                 = "https://mainnet.base.org"
rpc_url_backup          = "wss://base-mainnet.g.alchemy.com/v2/YOUR_KEY"
wzion_address              = "0x0c493763d107ab0ABb0aee1Ca3999292d8202bb6"
bridge_contract_address  = "0x72c8f0Dc60E27aB7A83fe3B416fab4F0600a6467"
bridge_validator_address = "0x9C138dC6ebA8A883AB3802F6Dcb79C772a835627"
finality_blocks          = 64
enabled                 = true
gas_strategy            = "eip1559"
max_gas_gwei            = 100
start_block             = 47687000  # Set to ~current block at new 5/5 bridge deployment

