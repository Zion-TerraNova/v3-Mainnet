# ── Validator Config ────────────────────────────────────────
[validator]
# 5/5 Guardian multisig — see V3/docs/BRIDGE_MULTISIG.md
# After BridgeValidator.sol deploy, replace the five placeholder addresses
# with real operator addresses and distribute one key per host.
private_key_file = "/etc/zion/keys/validator.key"
validator_id     = "validator-1"
threshold        = 5
total_validators = 5
validator_addresses = [
    "0xdde17506BC2D2dCE1d594bD1D85B0BAbb389D186",  # validator-1 (deployer + guardian, on-chain verified via Basescan)
    "0x24d986841E56e5571489B25951eE8C1Ae761FA82",  # validator-2 (on-chain verified via Basescan)
    "0x665c55eDCF25c2c5A1dfF1B20eE950cBDC58d3d0",  # validator-3 (on-chain verified via Basescan)
    "0x8E644b3E9FaBf52eE321DC5B3D5AA06d6e3E66C6",  # validator-4 (on-chain verified via Basescan)
    "0x7e0D2eD71d78B9CFB5034A83333e82e304bc4CB2",  # validator-5 (on-chain verified via Basescan)
]

# ── Security ──────────────────────────────────────────────
[security]
max_single_amount   = "1000000000000000000000000000"
daily_limit         = "5000000000000000000000000000"
min_bridge_amount   = "100000000000000000000"
timelock_threshold  = "1000000000000000000000000"
max_ops_per_hour    = 100
l1_block_timeout_secs = 300
auto_pause_on_anomaly = true

# ── Database ──────────────────────────────────────────────
[database]
path = "/data/zion/bridge-mainnet.db"
backup_interval_secs = 3600

# ── Metrics ───────────────────────────────────────────────
[metrics]
enabled   = true
port      = 9101
log_level = "info"
